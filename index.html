<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Send a Message</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nsfwjs@4.1.0/dist/nsfwjs.min.js"></script>
<style>
  :root {
    --bg:         #0d1117;
    --surface:    #161b22;
    --border:     #30363d;
    --border-hi:  #58a6ff;
    --steam-blue: #1a9fff;
    --steam-light:#66c0f4;
    --wa-green:   #25d366;
    --wa-dark:    #128c7e;
    --text:       #e6edf3;
    --muted:      #7d8590;
    --danger:     #f85149;
    --success:    #3fb950;
    --warn:       #d29922;
    --accent:     var(--steam-light);
  }
  body.wa-mode { --accent: var(--wa-green); }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Code Pro', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
    transition: background 0.3s;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 100;
  }
  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent), transparent);
    z-index: 101;
    transition: background 0.4s;
  }

  .container { width: 100%; max-width: 480px; }

  /* ── Style Picker ── */
  .style-picker {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.4s ease 0.05s forwards;
  }
  .style-btn {
    flex: 1;
    padding: 10px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Source Code Pro', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: all 0.2s;
  }
  .style-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .style-btn:hover { border-color: var(--muted); color: var(--text); }
  .style-btn.active-steam {
    border-color: var(--steam-light);
    color: var(--steam-light);
    background: rgba(102,192,244,0.08);
    box-shadow: 0 0 12px rgba(102,192,244,0.12);
  }
  .style-btn.active-wa {
    border-color: var(--wa-green);
    color: var(--wa-green);
    background: rgba(37,211,102,0.08);
    box-shadow: 0 0 12px rgba(37,211,102,0.12);
  }

  /* ── Header ── */
  .header {
    margin-bottom: 24px; text-align: center;
    opacity: 0; transform: translateY(-16px);
    animation: fadeDown 0.5s ease forwards;
  }
  .header-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
  .header-icon { width: 28px; height: 28px; filter: drop-shadow(0 0 8px rgba(102,192,244,0.5)); transition: filter 0.3s; }
  body.wa-mode .header-icon { filter: drop-shadow(0 0 8px rgba(37,211,102,0.5)); }
  .header h1 {
    font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(102,192,244,0.3);
    transition: color 0.3s, text-shadow 0.3s;
  }
  body.wa-mode .header h1 { text-shadow: 0 0 20px rgba(37,211,102,0.3); }
  .header p { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

  /* ── Model banner ── */
  #model-banner {
    background: rgba(210,153,34,0.12); border: 1px solid rgba(210,153,34,0.3);
    border-radius: 4px; padding: 7px 12px; font-size: 11px; color: var(--warn);
    letter-spacing: 0.08em; text-align: center; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    opacity: 0; animation: fadeUp 0.4s ease 0.2s forwards;
  }
  #model-banner.ready { background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.25); color: var(--success); }
  #model-banner.hidden { display: none; }

  /* ── Card ── */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 28px;
    position: relative; opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.5s ease 0.15s forwards;
    box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    transition: border-color 0.3s;
  }
  .card::before, .card::after {
    content: ''; position: absolute; width: 12px; height: 12px;
    border-color: var(--accent); border-style: solid;
    transition: border-color 0.3s;
  }
  .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 2px 0 0 0; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 2px 0; }

  .field { margin-bottom: 20px; }
  label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  label span.req { color: var(--accent); transition: color 0.3s; }
  label span.opt { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; }

  input[type="text"], textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'Source Code Pro', monospace; font-size: 13px;
    padding: 10px 12px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; resize: none;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--border-hi); box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }
  textarea { min-height: 80px; line-height: 1.5; }

  /* ── Saved indicator ── */
  .saved-tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--success);
    background: rgba(63,185,80,0.1);
    border: 1px solid rgba(63,185,80,0.2);
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-tag.visible { opacity: 1; }

  /* ── Upload ── */
  .upload-zone {
    border: 1px dashed var(--border); border-radius: 4px; padding: 20px 16px;
    text-align: center; cursor: pointer; transition: all 0.2s; position: relative; background: var(--bg);
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(102,192,244,0.04); }
  body.wa-mode .upload-zone:hover { background: rgba(37,211,102,0.04); }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 24px; margin-bottom: 5px; display: block; }
  .upload-zone p { font-size: 11px; color: var(--muted); }
  .upload-zone p strong { color: var(--accent); transition: color 0.3s; }
  .upload-zone .size-hint { font-size: 10px; color: var(--muted); margin-top: 3px; opacity: 0.7; }

  .preview-wrap { display: none; align-items: center; gap: 12px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; margin-top: 8px; }
  .preview-wrap.visible { display: flex; }
  .preview-wrap img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); transition: border-color 0.3s; }
  .preview-info { flex: 1; min-width: 0; }
  .preview-name { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview-size { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .preview-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 4px; transition: color 0.2s; }
  .preview-remove:hover { color: var(--danger); }

  .nsfw-status { display: none; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 10px; border-radius: 3px; margin-top: 6px; align-items: center; gap: 6px; }
  .nsfw-status.checking { display: flex; color: var(--warn);    background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.25); }
  .nsfw-status.safe     { display: flex; color: var(--success); background: rgba(63,185,80,0.1);  border: 1px solid rgba(63,185,80,0.25); }
  .nsfw-status.unsafe   { display: flex; color: var(--danger);  background: rgba(248,81,73,0.1);  border: 1px solid rgba(248,81,73,0.25); }

  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .char-counter { text-align: right; font-size: 10px; color: var(--muted); margin-top: 4px; }
  .char-counter.warn { color: var(--warn); }
  .char-counter.over { color: var(--danger); }

  /* ── Submit ── */
  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #1a6fa5, var(--steam-blue));
    border: 1px solid rgba(102,192,244,0.3); border-radius: 4px; color: #fff;
    font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 12px; cursor: pointer;
    transition: all 0.3s; position: relative; overflow: hidden; margin-top: 4px;
  }
  body.wa-mode .submit-btn {
    background: linear-gradient(135deg, #0a7a4a, var(--wa-green));
    border-color: rgba(37,211,102,0.3);
  }
  .submit-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent); opacity: 0; transition: opacity 0.2s; }
  .submit-btn:hover:not(:disabled)::before { opacity: 1; }
  .submit-btn:hover:not(:disabled) { box-shadow: 0 0 20px rgba(26,159,255,0.4); transform: translateY(-1px); }
  body.wa-mode .submit-btn:hover:not(:disabled) { box-shadow: 0 0 20px rgba(37,211,102,0.4); }
  .submit-btn:active:not(:disabled) { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .feedback { margin-top: 14px; padding: 10px 14px; border-radius: 4px; font-size: 12px; display: none; align-items: center; gap: 8px; }
  .feedback.success { display: flex; color: var(--success); background: rgba(63,185,80,0.1);  border: 1px solid rgba(63,185,80,0.3); }
  .feedback.error   { display: flex; color: var(--danger);  background: rgba(248,81,73,0.1);  border: 1px solid rgba(248,81,73,0.3); }
  .feedback.pending { display: flex; color: var(--warn);    background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.3); }

  .delay-notice {
    margin-top: 14px; padding: 10px 14px; border-radius: 4px; font-size: 10px; color: var(--muted);
    background: rgba(255,255,255,0.02); border: 1px solid var(--border); letter-spacing: 0.05em;
    line-height: 1.6; text-align: center;
    opacity: 0; animation: fadeUp 0.5s ease 0.35s forwards;
  }
  .delay-notice strong { color: var(--accent); transition: color 0.3s; }

  #cooldown-bar { height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent)); width: 0; border-radius: 2px; margin-top: 8px; transition: background 0.3s; }

  /* ── Cooldown overlay on button ── */
  .cooldown-text {
    display: none;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }
  .cooldown-text.visible { display: block; }

  @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp   { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">

  <!-- Style picker -->
  <div class="style-picker">
    <button class="style-btn active-steam" id="btn-steam" onclick="setStyle('steam')">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.909c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.718L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0z"/></svg>
      Steam
    </button>
    <button class="style-btn" id="btn-wa" onclick="setStyle('whatsapp')">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>

    </button>
  </div>

  <div id="model-banner">
    <span class="spin">⟳</span> Loading image scanner...
  </div>

  <div class="header">
    <div class="header-logo">
      <!-- Steam icon (shown by default) -->
      <svg id="icon-steam" class="header-icon" fill="var(--steam-light)" viewBox="0 0 24 24" width="28" height="28">
        <path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.909c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.718L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0z"/>
      </svg>
      <!-- WA icon (hidden by default) -->
      <svg id="icon-wa" class="header-icon" fill="var(--wa-green)" viewBox="0 0 24 24" width="28" height="28" style="display:none">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>

    <p id="header-sub">Send a message · It'll appear on stream</p>

  <div class="card">
    <div class="field">
      <label>Your Name <span class="req">*</span> <span class="saved-tag" id="name-saved">SAVED</span></label>
      <input type="text" id="sender-name" placeholder="YourUsername" maxlength="32" autocomplete="off" spellcheck="false"/>
    </div>
    <div class="field">
      <label>Message <span class="req">*</span></label>
      <textarea id="message" placeholder="Type your message..." maxlength="200"></textarea>
      <div class="char-counter" id="char-counter">0 / 200</div>
    </div>
    <div class="field">
      <label>Avatar Image <span class="opt">(optional · saved for next time)</span></label>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp"/>
        <span class="upload-icon">🖼️</span>
        <p><strong>Click to upload</strong> or drag & drop</p>
        <p class="size-hint">PNG, JPG, GIF, WEBP · max 2MB</p>
      </div>
      <div class="preview-wrap" id="preview-wrap">
        <img id="preview-img" src="" alt=""/>
        <div class="preview-info">
          <div class="preview-name" id="preview-name"></div>
          <div class="preview-size" id="preview-size"></div>
        </div>
        <button class="preview-remove" id="preview-remove">✕</button>
      </div>
      <div class="nsfw-status" id="nsfw-status"></div>
    </div>

    <button class="submit-btn" id="submit-btn" disabled>Send to Stream</button>
    <div id="cooldown-bar"></div>
    <div class="cooldown-text" id="cooldown-text"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="delay-notice">
    Messages appear after a short delay.<br/>
    <strong>Keep it clean</strong> — NSFW images are automatically blocked.
  </div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const BACKEND_URL   = 'https://stream-overlay-backend-b0i4.onrender.com';
const MAX_FILE_SIZE = 2 * 1024 * 1024;
const MSG_COOLDOWN  = 30000;
const NSFW_THRESHOLDS = { Porn: 0.60, Sexy: 0.80, Hentai: 0.60 };
const LS_COOLDOWN   = 'overlay_last_submit';
const LS_USERNAME   = 'overlay_username';
const LS_IMAGE      = 'overlay_image_b64';
const LS_IMGNAME    = 'overlay_image_name';
const LS_STYLE      = 'overlay_style';

// ── STATE ─────────────────────────────────────────────────────────────────────
let nsfwModel    = null;
let selectedFile = null;
let savedImageB64= null;   // base64 of saved avatar
let nsfwPassed   = true;
let currentStyle = localStorage.getItem(LS_STYLE) || 'steam';

const nameInput   = document.getElementById('sender-name');
const msgInput    = document.getElementById('message');
const fileInput   = document.getElementById('file-input');
const uploadZone  = document.getElementById('upload-zone');
const previewWrap = document.getElementById('preview-wrap');
const previewImg  = document.getElementById('preview-img');
const previewName = document.getElementById('preview-name');
const previewSize = document.getElementById('preview-size');
const previewRm   = document.getElementById('preview-remove');
const nsfwStatus  = document.getElementById('nsfw-status');
const submitBtn   = document.getElementById('submit-btn');
const feedback    = document.getElementById('feedback');
const charCounter = document.getElementById('char-counter');
const cooldownBar = document.getElementById('cooldown-bar');
const cooldownTxt = document.getElementById('cooldown-text');
const modelBanner = document.getElementById('model-banner');
const nameSaved   = document.getElementById('name-saved');

// ── STYLE SWITCHER ────────────────────────────────────────────────────────────
function setStyle(style) {
  currentStyle = style;
  localStorage.setItem(LS_STYLE, style);

  document.body.classList.toggle('wa-mode', style === 'whatsapp');

  document.getElementById('btn-steam').className = 'style-btn' + (style === 'steam' ? ' active-steam' : '');
  document.getElementById('btn-wa').className    = 'style-btn' + (style === 'whatsapp' ? ' active-wa' : '');

  document.getElementById('icon-steam').style.display = style === 'steam' ? '' : 'none';
  document.getElementById('icon-wa').style.display    = style === 'whatsapp' ? '' : 'none';

  document.getElementById('header-title').textContent = style === 'steam' ? 'STEAM MESSAGE' : 'WHATSAPP MESSAGE';
}

setStyle(currentStyle);

// ── RESTORE SAVED DATA ────────────────────────────────────────────────────────
const savedName = localStorage.getItem(LS_USERNAME);
if (savedName) {
  nameInput.value = savedName;
  nameSaved.classList.add('visible');
}

const savedImg  = localStorage.getItem(LS_IMAGE);
const savedImgName = localStorage.getItem(LS_IMGNAME);
if (savedImg) {
  savedImageB64 = savedImg;
  previewImg.src = savedImg;
  previewName.textContent = savedImgName || 'Saved avatar';
  previewSize.textContent = 'from last session';
  previewWrap.classList.add('visible');
  uploadZone.style.display = 'none';
  nsfwPassed = true; // already checked on upload
  nsfwStatus.innerHTML = '✓ Saved from last session';
  nsfwStatus.className = 'nsfw-status safe';
}

// ── COOLDOWN RESTORE ──────────────────────────────────────────────────────────
let lastSubmitTime = parseInt(localStorage.getItem(LS_COOLDOWN) || '0', 10);

function getRemainingCooldown() {
  return Math.max(0, MSG_COOLDOWN - (Date.now() - lastSubmitTime));
}

// If there's remaining cooldown from a previous session, show it
if (getRemainingCooldown() > 0) {
  resumeCooldownUI();
}

function resumeCooldownUI() {
  const remaining = getRemainingCooldown();
  if (remaining <= 0) { validate(); return; }

  const pct = (remaining / MSG_COOLDOWN) * 100;
  cooldownBar.style.width = pct + '%';
  cooldownTxt.classList.add('visible');

  const tick = setInterval(() => {
    const r = getRemainingCooldown();
    cooldownBar.style.width = Math.max(0, (r / MSG_COOLDOWN) * 100) + '%';
    cooldownTxt.textContent = `Wait ${Math.ceil(r / 1000)}s before sending again`;
    if (r <= 0) {
      clearInterval(tick);
      cooldownBar.style.width = '0';
      cooldownTxt.classList.remove('visible');
      validate();
    }
  }, 200);

  validate();
}

// ── SAVE USERNAME ─────────────────────────────────────────────────────────────
nameInput.addEventListener('input', () => {
  const v = nameInput.value.trim();
  if (v.length > 0) {
    localStorage.setItem(LS_USERNAME, v);
    nameSaved.classList.add('visible');
  } else {
    localStorage.removeItem(LS_USERNAME);
    nameSaved.classList.remove('visible');
  }
  validate();
});

// ── CHAR COUNTER ──────────────────────────────────────────────────────────────
msgInput.addEventListener('input', () => {
  const len = msgInput.value.length;
  charCounter.textContent = `${len} / 200`;
  charCounter.className = 'char-counter' + (len > 180 ? (len >= 200 ? ' over' : ' warn') : '');
  validate();
});

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

previewRm.addEventListener('click', () => {
  selectedFile = null; savedImageB64 = null; nsfwPassed = true; fileInput.value = '';
  localStorage.removeItem(LS_IMAGE); localStorage.removeItem(LS_IMGNAME);
  previewWrap.classList.remove('visible');
  nsfwStatus.className = 'nsfw-status'; nsfwStatus.textContent = '';
  uploadZone.style.display = ''; validate();
});

// ── FILE HANDLING ─────────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file.type.startsWith('image/')) return showFeedback('error', '✕ Only image files are accepted.');
  if (file.size > MAX_FILE_SIZE) return showFeedback('error', '✕ Image too large. Max 2MB.');
  selectedFile = file; nsfwPassed = false;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    previewImg.src = dataUrl;
    previewName.textContent = file.name;
    previewSize.textContent = formatBytes(file.size);
    previewWrap.classList.add('visible');
    uploadZone.style.display = 'none';
    checkNSFW(dataUrl, file.name);
  };
  reader.readAsDataURL(file);
}

// ── NSFW CHECK ────────────────────────────────────────────────────────────────
async function loadNsfwModel() {
  try {
    nsfwModel = await nsfwjs.load('https://nsfwjs.com/quant_nsfw_mobilenet/');
    modelBanner.innerHTML = '✓ Image scanner ready';
    modelBanner.classList.add('ready');
    setTimeout(() => modelBanner.classList.add('hidden'), 2000);
    validate();
  } catch(e) {
    modelBanner.classList.add('hidden');
    nsfwModel = null;
    validate();
  }
}
loadNsfwModel();

async function checkNSFW(dataUrl, filename) {
  if (!nsfwModel) {
    nsfwStatus.innerHTML = '⚠ Scanner loading, proceeding anyway';
    nsfwStatus.className = 'nsfw-status checking';
    nsfwPassed = true;
    // Save optimistically — will be checked again on next proper load
    savedImageB64 = dataUrl;
    localStorage.setItem(LS_IMAGE, dataUrl);
    localStorage.setItem(LS_IMGNAME, filename || 'avatar');
    validate(); return;
  }

  nsfwStatus.innerHTML = '<span class="spin">⟳</span> Scanning image...';
  nsfwStatus.className = 'nsfw-status checking';
  submitBtn.disabled = true;

  try {
    const img = new Image();
    img.src = dataUrl;
    await new Promise(res => img.onload = res);
    const predictions = await nsfwModel.classify(img);
    let blocked = false, reason = '';
    for (const p of predictions) {
      const t = NSFW_THRESHOLDS[p.className];
      if (t !== undefined && p.probability >= t) { blocked = true; reason = `${p.className} (${(p.probability*100).toFixed(0)}%)`; break; }
    }
    if (blocked) {
      nsfwStatus.innerHTML = `✕ Image rejected: ${reason}`;
      nsfwStatus.className = 'nsfw-status unsafe';
      nsfwPassed = false;
    } else {
      nsfwStatus.innerHTML = '✓ Image looks clean';
      nsfwStatus.className = 'nsfw-status safe';
      nsfwPassed = true;
      // Save to localStorage for next session
      savedImageB64 = dataUrl;
      localStorage.setItem(LS_IMAGE, dataUrl);
      localStorage.setItem(LS_IMGNAME, filename || 'avatar');
    }
  } catch(e) {
    nsfwStatus.innerHTML = '⚠ Could not scan image';
    nsfwStatus.className = 'nsfw-status checking';
    nsfwPassed = true;
  }
  validate();
}

// ── VALIDATE ──────────────────────────────────────────────────────────────────
function validate() {
  const ok = nameInput.value.trim().length > 0
    && msgInput.value.trim().length > 0
    && nsfwPassed
    && getRemainingCooldown() <= 0;
  submitBtn.disabled = !ok;
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
submitBtn.addEventListener('click', async () => {
  const name = nameInput.value.trim(), message = msgInput.value.trim();
  if (!name || !message) return;
  submitBtn.disabled = true;
  showFeedback('pending', '⟳ Sending...');

  const body = new FormData();
  body.append('title', name);
  body.append('message', message);
  body.append('style', currentStyle);

  // Use saved image blob or current file
  if (selectedFile) {
    body.append('image', selectedFile);
  } else if (savedImageB64) {
    // Convert base64 back to blob for upload
    try {
      const res  = await fetch(savedImageB64);
      const blob = await res.blob();
      body.append('image', blob, 'avatar.jpg');
    } catch(e) {}
  }

  try {
    const resp = await fetch(`${BACKEND_URL}/submit`, { method: 'POST', body });
    const data = await resp.json();
    if (resp.ok && data.status === 'queued') {
      showFeedback('success', '✓ Message sent! It\'ll appear on stream shortly.');
      msgInput.value = ''; charCounter.textContent = '0 / 200';
      // Don't clear name or image — keep for next message
      startCooldown();
    } else {
      showFeedback('error', `✕ ${data.error || 'Something went wrong.'}`); validate();
    }
  } catch(e) {
    showFeedback('error', '✕ Could not reach server. Try again.'); validate();
  }
});

function startCooldown() {
  lastSubmitTime = Date.now();
  localStorage.setItem(LS_COOLDOWN, lastSubmitTime.toString());
  cooldownBar.style.width = '100%';
  cooldownTxt.classList.add('visible');

  const tick = setInterval(() => {
    const r = getRemainingCooldown();
    cooldownBar.style.width = Math.max(0, (r / MSG_COOLDOWN) * 100) + '%';
    cooldownTxt.textContent = `Wait ${Math.ceil(r / 1000)}s before sending again`;
    if (r <= 0) {
      clearInterval(tick);
      cooldownBar.style.width = '0';
      cooldownTxt.classList.remove('visible');
      validate();
    }
  }, 200);
}

function showFeedback(type, msg) { feedback.className = `feedback ${type}`; feedback.textContent = msg; }
function formatBytes(b) { return b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }

validate();
</script>
</body>
